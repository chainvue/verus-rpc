name: RPC drift

# Weekly: does the Verus daemon's RPC command set (the CRPCCommand tables in
# VerusCoin/VerusCoin) still match rpc/commands-baseline.json? On drift, open or
# update ONE tracking issue. Deterministic source diff — see
# scripts/rpc-drift.mjs. Runs no package code and needs no daemon.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write # least privilege: read the repo, file the drift issue

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Check RPC command drift
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # lifts the API rate limit
        run: node scripts/rpc-drift.mjs --json drift.json

      - name: Open or update the drift issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          drift=$(node -e 'process.stdout.write(String(require("./drift.json").drift))')
          echo "drift=$drift"
          if [ "$drift" != "true" ]; then
            echo "No drift — nothing to file."
            exit 0
          fi
          node -e 'require("fs").writeFileSync("drift-body.md", require("./drift.json").report)'
          gh label create rpc-drift --color BFD4F2 --description "Daemon RPC command set drift" 2>/dev/null || true
          num=$(gh issue list --state open --label rpc-drift --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue edit "$num" --body-file drift-body.md
            gh issue comment "$num" --body "Re-checked on $(date -u +%F) — drift still present."
            echo "Updated issue #$num"
          else
            gh issue create --title "RPC command drift detected" --body-file drift-body.md --label rpc-drift
            echo "Opened a new drift issue"
          fi
