# Release — automated via semantic-release (Conventional Commits).
#
# Trigger model: ZERO-TOUCH. Every push to `main` runs semantic-release; it
# analyzes the commits since the last `v*` tag and, IF there is a releasable
# change (feat → minor, fix → patch, `!`/BREAKING → major), it:
#   1. computes the next version and updates package.json + CHANGELOG.md,
#   2. publishes to npm via the PROVEN OIDC path — semantic-release owns
#      versioning only; the actual publish is `pnpm publish` (exec plugin), so
#      no NPM token is needed and provenance is generated (id-token: write),
#   3. commits the bump + changelog back to main ([skip ci]) and creates the
#      git tag + GitHub release.
# No releasable commits → no-op. Use the workflow_dispatch dry-run to preview.
#
# Auth: npm trusted publishing (OIDC). Trusted-publisher registration is per
# PACKAGE NAME — the rename to `@chainvue/verus-rpc` needs a NEW registration
# (package `@chainvue/verus-rpc`, repo chainvue/verus-rpc, workflow
# `release.yml`); the old `verus-rpc` registration does not carry over. The
# first publish of the new scoped name is manual (browser flow); OIDC covers
# every subsequent version. Scoped packages default to `access: restricted`, so
# publishConfig.access + `pnpm publish --access public` keep it public. @semantic-
# release/npm runs with npmPublish:false — it never needs NPM_TOKEN; the exec
# plugin's `pnpm publish` does the token-less OIDC publish.
#
# Requires: `main` must allow the GITHUB_TOKEN to push the release commit + tag
# (semantic-release pushes back). If main is protection-locked to PRs, grant
# the token a bypass or move to a release-PR model.
#
# Security: this workflow holds `id-token: write` (npm publish rights) — the
# highest-value target in the repo. Third-party actions are PINNED to commit
# SHAs (not mutable `@vN` tags) to defend against tag-hijack supply-chain
# attacks; the `# vN` comments let Dependabot keep them fresh. Token scope is
# least-privilege (only contents + id-token; github-plugin comments/labels are
# disabled in .releaserc.json).
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: compute the next version + notes, but do not publish or tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      # Set by the exec plugin's successCmd on a real publish; empty on no-op.
      version: ${{ steps.semrel.outputs.version }}
    permissions:
      contents: write # semantic-release pushes the release commit + tag
      id-token: write # OIDC token for npm trusted publishing (provenance)
      # No issues/pull-requests scope: the github plugin's comments + labels
      # are disabled in .releaserc.json, so the release only needs to create a
      # GitHub Release (contents) and mint the OIDC token — least privilege.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history + tags: semantic-release needs them

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Release
        id: semrel
        run: >-
          pnpm exec semantic-release
          ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  smoke:
    needs: release
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          # npm-only job: disable package-manager caching so setup-node does
          # not try to invoke pnpm (from the checked-out packageManager field).
          package-manager-cache: false

      # Validate the version this run actually published (exec successCmd
      # exports it) — falling back to `npm view` only lets registry lag
      # green-light the PREVIOUS version, so the fallback is used solely for
      # no-op runs, where re-checking the existing latest is cheap + harmless.
      - name: Resolve version to validate
        id: v
        env:
          RELEASED: ${{ needs.release.outputs.version }}
        run: |
          if [ -n "$RELEASED" ]; then
            echo "version=$RELEASED" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(npm view @chainvue/verus-rpc version)" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            if npm view "@chainvue/verus-rpc@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
              echo "available"; exit 0
            fi
            echo "waiting for @chainvue/verus-rpc@${{ steps.v.outputs.version }} ($i)"; sleep 5
          done
          echo "version never appeared on registry"; exit 1

      - name: Install from registry into a fresh project
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm pkg set type=module
          npm install "@chainvue/verus-rpc@${{ steps.v.outputs.version }}"

      # Blocking: proves the published tarball imports as ESM and that the
      # money path works. Offline on purpose — nothing here can fail because
      # of someone else's infrastructure.
      - name: Import + offline assertions
        run: |
          cd /tmp/smoke
          cat > smoke.mjs <<'EOF'
          import { VerusClient, formatAmount, parseAmount, MockTransport } from "@chainvue/verus-rpc";
          if (parseAmount("2.00000000") !== 200000000n) throw new Error("parseAmount broken");
          if (formatAmount(200000000n) !== "2.00000000") throw new Error("formatAmount broken");
          const mock = new MockTransport().respondJson("getblockcount", "42");
          if ((await new VerusClient({ transport: mock }).chain.getBlockCount()) !== 42) throw new Error("mock broken");
          console.log("smoke ok (offline)");
          EOF
          node smoke.mjs

      # Non-blocking: a nice end-to-end signal, but it depends on a public
      # gateway we do not control. The package is already published by this
      # point, so letting a third-party outage turn the release red would be a
      # false alarm on the highest-stakes workflow.
      - name: Live gateway call (informational)
        continue-on-error: true
        run: |
          cd /tmp/smoke
          cat > live.mjs <<'EOF'
          import { VerusClient, formatAmount } from "@chainvue/verus-rpc";
          // Public gateways take no credentials — omit them entirely.
          const client = new VerusClient({ url: "https://api.verus.services" });
          const info = await client.chain.getInfo();
          console.log("live ok:", info.VRSCversion, formatAmount(info.relayfee));
          EOF
          node live.mjs
