# Release — automated via semantic-release (Conventional Commits).
#
# Trigger model: ZERO-TOUCH. Every push to `main` runs semantic-release; it
# analyzes the commits since the last `v*` tag and, IF there is a releasable
# change (feat → minor, fix → patch, `!`/BREAKING → major), it:
#   1. computes the next version and updates package.json + CHANGELOG.md,
#   2. publishes to npm via the PROVEN OIDC path — semantic-release owns
#      versioning only; the actual publish is `pnpm publish` (exec plugin), so
#      no NPM token is needed and provenance is generated (id-token: write),
#   3. commits the bump + changelog back to main ([skip ci]) and creates the
#      git tag + GitHub release.
# No releasable commits → no-op. Use the workflow_dispatch dry-run to preview.
#
# Auth: npm trusted publishing (OIDC), same registration as before (package
# `verus-rpc`, repo chainvue/verus-rpc, workflow `release.yml`). @semantic-
# release/npm runs with npmPublish:false — it never needs NPM_TOKEN; the exec
# plugin's `pnpm publish` does the token-less OIDC publish.
#
# Requires: `main` must allow the GITHUB_TOKEN to push the release commit + tag
# (semantic-release pushes back). If main is protection-locked to PRs, grant
# the token a bypass or move to a release-PR model.
#
# Security: this workflow holds `id-token: write` (npm publish rights) — the
# highest-value target in the repo. Third-party actions are PINNED to commit
# SHAs (not mutable `@vN` tags) to defend against tag-hijack supply-chain
# attacks; the `# vN` comments let Dependabot keep them fresh. Token scope is
# least-privilege (only contents + id-token; github-plugin comments/labels are
# disabled in .releaserc.json).
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: compute the next version + notes, but do not publish or tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # semantic-release pushes the release commit + tag
      id-token: write # OIDC token for npm trusted publishing (provenance)
      # No issues/pull-requests scope: the github plugin's comments + labels
      # are disabled in .releaserc.json, so the release only needs to create a
      # GitHub Release (contents) and mint the OIDC token — least privilege.
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # full history + tags: semantic-release needs them

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Release
        run: >-
          pnpm exec semantic-release
          ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  smoke:
    needs: release
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          # npm-only job: disable package-manager caching so setup-node does
          # not try to invoke pnpm (from the checked-out packageManager field).
          package-manager-cache: false

      # Validate whatever is CURRENTLY latest on the registry — if this run
      # published, that's the new version; if it was a no-op, it re-checks the
      # existing latest (cheap, harmless).
      - name: Resolve latest published version
        id: v
        run: echo "version=$(npm view verus-rpc version)" >> "$GITHUB_OUTPUT"

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            if npm view "verus-rpc@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
              echo "available"; exit 0
            fi
            echo "waiting for verus-rpc@${{ steps.v.outputs.version }} ($i)"; sleep 5
          done
          echo "version never appeared on registry"; exit 1

      - name: Install from registry into a fresh project
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm pkg set type=module
          npm install "verus-rpc@${{ steps.v.outputs.version }}"

      - name: Import + read-only call
        run: |
          cd /tmp/smoke
          cat > smoke.mjs <<'EOF'
          import { VerusClient, formatAmount, parseAmount, MockTransport } from "verus-rpc";
          if (parseAmount("2.00000000") !== 200000000n) throw new Error("parseAmount broken");
          const mock = new MockTransport().respondJson("getblockcount", "42");
          if ((await new VerusClient({ transport: mock }).chain.getBlockCount()) !== 42) throw new Error("mock broken");
          const client = new VerusClient({ url: "https://api.verus.services", user: "public", pass: "public" });
          const info = await client.chain.getInfo();
          console.log("smoke ok:", info.VRSCversion, formatAmount(info.relayfee));
          EOF
          node smoke.mjs
